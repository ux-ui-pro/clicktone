<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickTone • Dev</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        font-family: system-ui, sans-serif;
        color: #fafafa;
        background: #121212;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 8px;
        padding: 12px 18px;
        font: inherit;
        background: #fafafa;
        color: #121212;
        cursor: pointer;
      }

      button.is-muted {
        background: #444;
        color: #fafafa;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      select,
      input[type='range'] {
        accent-color: #9fcbff;
      }

      select {
        border-radius: 6px;
        border: 1px solid #3a3a3a;
        background: #1d1d1d;
        color: #fafafa;
        padding: 8px 10px;
        font: inherit;
      }

      #log {
        width: min(100% - 30px, 420px);
        height: 160px;
        overflow: auto;
        padding: 10px 12px;
        border-radius: 8px;
        background: #1e1e1e;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>ClickTone • dev playground</h1>

    <div class="controls">
      <button id="playBtn" type="button">Play</button>
      <button id="muteBtn" type="button">Mute</button>
      <label>
        Source
        <select id="source">
          <option value="m4a">cartoon.m4a</option>
          <option value="mp3" selected>cartoon.mp3</option>
          <option value="wav">cartoon.wav</option>
          <option value="flac">cartoon.flac</option>
          <option value="opus">cartoon.opus</option>
        </select>
      </label>
      <label>
        Volume
        <input id="volume" type="range" min="0" max="1" step="0.05" value="0.7" />
      </label>
    </div>

    <div id="log"></div>

    <script type="module">
      import { ClickTone } from './src/main.ts';

      const playBtn = document.getElementById('playBtn');
      const muteBtn = document.getElementById('muteBtn');
      const sourceSelect = document.getElementById('source');
      const volume = document.getElementById('volume');
      const logEl = document.getElementById('log');

      const log = (message) => {
        const time = new Date().toLocaleTimeString();
        logEl.textContent = `[${time}] ${message}\n${logEl.textContent}`;
      };

      const audioUrls = {
        m4a: new URL('./demo/assets/audio/cartoon.m4a', import.meta.url).href,
        mp3: new URL('./demo/assets/audio/cartoon.mp3', import.meta.url).href,
        wav: new URL('./demo/assets/audio/cartoon.wav', import.meta.url).href,
        flac: new URL('./demo/assets/audio/cartoon.flac', import.meta.url).href,
        opus: new URL('./demo/assets/audio/cartoon.opus', import.meta.url).href,
      };

      const sound = new ClickTone({
        src: audioUrls.mp3,
        volume: Number(volume.value),
        throttle: 40,
        pitchVariation: 0.08,
        preload: true,
      });

      sound.on('unlock', () => log('audio unlocked'));
      sound.on('load', (audioBuffer) => log(`decoded buffer (${audioBuffer.duration.toFixed(3)}s)`));
      sound.on('play', () => log('play'));
      sound.on('end', () => log('end'));
      sound.on('error', (error) => log(`error: ${error.message}`));

      sourceSelect.addEventListener('change', () => {
        const value = sourceSelect.value;
        log(`source = ${value}`);
      });

      playBtn.addEventListener('click', () => {
        const selected = sourceSelect.value;
        void sound.play(audioUrls[selected]);
      });

      muteBtn.addEventListener('click', () => {
        const muted = sound.toggleMuted();
        muteBtn.classList.toggle('is-muted', muted);
        muteBtn.textContent = muted ? 'Unmute' : 'Mute';
        log(muted ? 'muted' : 'unmuted');
      });

      volume.addEventListener('input', () => {
        sound.setVolume(Number(volume.value));
      });

      log('ready — click Play');
    </script>
  </body>
</html>
